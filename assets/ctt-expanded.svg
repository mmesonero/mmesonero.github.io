<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg-page" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A1917"/>
      <stop offset="100%" stop-color="#0F0E0D"/>
    </radialGradient>
    <linearGradient id="bar-orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4670F"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="bar-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="window-shadow">
      <feDropShadow dx="0" dy="20" stdDeviation="50" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg-page)"/>

  <!-- Browser chrome -->
  <rect x="80" y="40" width="1440" height="820" rx="12" fill="rgba(255,253,247,0.02)" stroke="rgba(255,253,247,0.06)" stroke-width="1"/>
  <rect x="380" y="58" width="840" height="24" rx="12" fill="rgba(255,253,247,0.04)"/>
  <text x="800" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11.5" fill="rgba(255,253,247,0.2)">claude.ai/new</text>
  <circle cx="110" cy="70" r="5" fill="rgba(255,80,80,0.5)"/>
  <circle cx="128" cy="70" r="5" fill="rgba(255,180,0,0.4)"/>
  <circle cx="146" cy="70" r="5" fill="rgba(50,200,80,0.4)"/>

  <!-- DASHBOARD WINDOW — taller to show expanded card -->
  <rect x="580" y="120" width="440" height="660" rx="16" fill="#0F0E0D" stroke="rgba(255,253,247,0.09)" stroke-width="1" filter="url(#window-shadow)"/>

  <!-- Header -->
  <g transform="translate(622, 158)">
    <rect x="0"  y="14" width="8"  height="10" rx="1.5" fill="#FFFDF7" opacity="0.9"/>
    <rect x="11" y="8"  width="8"  height="16" rx="1.5" fill="#FFFDF7" opacity="0.9"/>
    <rect x="22" y="2"  width="8"  height="22" rx="1.5" fill="#D4670F" opacity="0.95"/>
    <text x="46" y="15" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#FFFDF7" letter-spacing="-0.3">Usage</text>
    <text x="46" y="30" font-family="system-ui, sans-serif" font-size="11.5" fill="rgba(255,253,247,0.35)">claude.ai</text>
  </g>

  <!-- Card 1: 5-HOUR (EXPANDED) -->
  <rect x="608" y="220" width="384" height="230" rx="12" fill="rgba(255,253,247,0.055)" stroke="rgba(255,253,247,0.11)" stroke-width="1"/>
  <!-- Expanded indicator -->
  <text x="625" y="246" font-family="system-ui, sans-serif" font-size="11" font-weight="500" letter-spacing="1.2" fill="rgba(255,253,247,0.5)">5-HOUR</text>
  <text x="628" y="246" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,253,247,0.2)">▲</text>
  <text x="976" y="246" text-anchor="end" font-family="system-ui, sans-serif" font-size="10.5" fill="rgba(255,253,247,0.25)">Resets Wed 04:40</text>

  <!-- Bar row -->
  <rect x="625" y="270" width="240" height="4" rx="2" fill="rgba(255,253,247,0.08)"/>
  <rect x="625" y="270" width="160" height="4" rx="2" fill="url(#bar-orange)"/>
  <text x="972" y="278" text-anchor="end" font-family="system-ui, sans-serif" font-size="28" font-weight="700" letter-spacing="-1" fill="#F59E0B">67%</text>

  <!-- Divider -->
  <line x1="625" y1="296" x2="972" y2="296" stroke="rgba(255,253,247,0.06)" stroke-width="1"/>

  <!-- Per-model breakdown -->
  <text x="625" y="314" font-family="system-ui, sans-serif" font-size="9" letter-spacing="0.8" fill="rgba(255,253,247,0.2)">BY MODEL</text>
  <text x="625" y="336" font-family="system-ui, sans-serif" font-size="10.5" fill="rgba(255,253,247,0.28)">claude-opus-4-7</text>
  <text x="972" y="336" text-anchor="end" font-family="system-ui, sans-serif" font-size="10.5" fill="rgba(255,253,247,0.42)">124,820 tok</text>
  <text x="625" y="356" font-family="system-ui, sans-serif" font-size="10.5" fill="rgba(255,253,247,0.22)">claude-sonnet-4-6</text>
  <text x="972" y="356" text-anchor="end" font-family="system-ui, sans-serif" font-size="10.5" fill="rgba(255,253,247,0.32)">38,440 tok</text>
  <text x="625" y="376" font-family="system-ui, sans-serif" font-size="10.5" fill="rgba(255,253,247,0.16)">claude-haiku-4-5</text>
  <text x="972" y="376" text-anchor="end" font-family="system-ui, sans-serif" font-size="10.5" fill="rgba(255,253,247,0.22)">12,100 tok</text>

  <!-- Sparkline (7-day bar chart) -->
  <text x="625" y="400" font-family="system-ui, sans-serif" font-size="9" letter-spacing="0.8" fill="rgba(255,253,247,0.2)">7-DAY USAGE</text>
  <!-- Bars -->
  <rect x="625" y="420" width="30" height="14" rx="2" fill="rgba(59,130,246,0.25)"/>
  <rect x="659" y="415" width="30" height="19" rx="2" fill="rgba(59,130,246,0.3)"/>
  <rect x="693" y="408" width="30" height="26" rx="2" fill="rgba(59,130,246,0.32)"/>
  <rect x="727" y="411" width="30" height="23" rx="2" fill="rgba(59,130,246,0.3)"/>
  <rect x="761" y="406" width="30" height="28" rx="2" fill="rgba(59,130,246,0.33)"/>
  <rect x="795" y="398" width="30" height="36" rx="2" fill="rgba(59,130,246,0.4)"/>
  <rect x="829" y="403" width="30" height="31" rx="2" fill="rgba(59,130,246,0.7)"/> <!-- today -->
  <!-- Day labels -->
  <text x="640" y="447" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="rgba(255,253,247,0.15)">Sat</text>
  <text x="674" y="447" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="rgba(255,253,247,0.15)">Sun</text>
  <text x="708" y="447" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="rgba(255,253,247,0.15)">Mon</text>
  <text x="742" y="447" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="rgba(255,253,247,0.15)">Tue</text>
  <text x="776" y="447" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="rgba(255,253,247,0.15)">Wed</text>
  <text x="810" y="447" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="rgba(255,253,247,0.15)">Thu</text>
  <text x="844" y="447" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="rgba(255,253,247,0.2)">Fri</text>

  <!-- Card 2: WEEKLY (collapsed) -->
  <rect x="608" y="466" width="384" height="90" rx="12" fill="rgba(255,253,247,0.04)" stroke="rgba(255,253,247,0.07)" stroke-width="1"/>
  <text x="625" y="491" font-family="system-ui, sans-serif" font-size="11" font-weight="500" letter-spacing="1.2" fill="rgba(255,253,247,0.5)">WEEKLY</text>
  <text x="972" y="491" text-anchor="end" font-family="system-ui, sans-serif" font-size="10.5" fill="rgba(255,253,247,0.25)">Resets Sun 00:00</text>
  <rect x="625" y="514" width="240" height="4" rx="2" fill="rgba(255,253,247,0.08)"/>
  <rect x="625" y="514" width="55" height="4" rx="2" fill="url(#bar-blue)"/>
  <text x="972" y="522" text-anchor="end" font-family="system-ui, sans-serif" font-size="28" font-weight="700" letter-spacing="-1" fill="#60A5FA">23%</text>
  <text x="625" y="543" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,253,247,0.22)">of weekly limit · click to expand</text>

  <!-- LIVE badge -->
  <rect x="750" y="578" width="100" height="26" rx="13" fill="rgba(255,253,247,0.03)" stroke="rgba(74,222,128,0.35)" stroke-width="1"/>
  <circle cx="770" cy="591" r="3.5" fill="#4ADE80"/>
  <text x="800" y="595" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="0.8" fill="#4ADE80">LIVE</text>
  <text x="665" y="595" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10.5" fill="rgba(255,253,247,0.2)">GitHub</text>
  <text x="940" y="595" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10.5" fill="rgba(255,253,247,0.2)">LinkedIn</text>

  <!-- Callout -->
  <rect x="1085" y="230" width="210" height="48" rx="8" fill="rgba(212,103,15,0.10)" stroke="rgba(212,103,15,0.3)" stroke-width="1"/>
  <text x="1190" y="253" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11.5" font-weight="600" fill="rgba(212,103,15,0.9)">Click to expand</text>
  <text x="1190" y="269" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10.5" fill="rgba(255,253,247,0.35)">per-model + 7-day history</text>
  <line x1="1083" y1="254" x2="994" y2="300" stroke="rgba(212,103,15,0.5)" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
