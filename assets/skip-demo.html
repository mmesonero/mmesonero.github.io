<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CleanFeed Skip Demo</title>
  <style>
    :root {
      --bg: #0D0D0D;
      --surface: #1A1A17;
      --surface-soft: #1A1A17;
      --border: #2a2a2f;
      --text: #f0ede8;
      --desc: #7d7975;
      --muted: #5a5a62;
      --gold: #e2ba6b;
      --gold-soft: rgba(226, 186, 107,0.13);
      --radius: 10px;
      --mono: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 50px 44px 18px;
      overflow: hidden;
    }
    .panel-wrap {
      transform-origin: center center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .icon-ring {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 2px solid #e2ba6b;
      background: #1A1A17;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 28px rgba(226, 186, 107, 0.18);
      flex-shrink: 0;
    }
    .icon-ring img {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }

    /* Skip Configuration panel, matches speed-demo .panel exactly */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 720px;
      max-width: 100%;
      overflow: hidden;
    }
    .panel-head {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.1px;
    }
    .panel-row {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 22px 26px;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    .panel-row:hover { background: rgba(255,255,255,0.02); }
    .panel-row:last-child { border-bottom: 0; }
    .row-key {
      flex: 1;
      min-width: 0;
    }
    .row-key strong {
      display: block;
      font-size: 22px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.1px;
    }
    .row-key span {
      display: block;
      margin-top: 3px;
      font-size: 15px;
      color: var(--desc);
    }
    .row-controls {
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .control {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .control-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.2px;
      color: var(--muted);
      font-weight: 400;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .step-btn {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
    }
    .step-btn:hover { color: var(--gold); border-color: var(--gold); background: var(--gold-soft); }
    .step-value {
      font-family: var(--mono);
      font-size: 17px;
      font-weight: 700;
      color: var(--gold);
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 14px;
      min-width: 70px;
      text-align: center;
    }
    .key-pill {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--gold);
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 18px;
      min-width: 52px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      cursor: pointer;
      text-align: center;
    }
    .key-pill:hover { border-color: var(--gold); background: var(--gold-soft); }
    @media (max-width: 600px) {
      .panel { padding: 8px 10px; }
      .panel-title { font-size: 12px; }
      .panel-row { padding: 12px 10px; }
    }
  </style>
</head>
<body>
  <div class="panel-wrap">
  <div class="panel">
    <div class="panel-head">
      <div class="panel-title">Skip Configuration</div>
    </div>
    <div class="panel-row">
      <div class="row-key">
        <strong>Forward</strong>
        <span>+10s per press</span>
      </div>
      <div class="row-controls">
        <div class="control">
          <span class="control-label">seconds</span>
          <div class="step">
            <button class="step-btn">&minus;</button>
            <span class="step-value">10s</span>
            <button class="step-btn">+</button>
          </div>
        </div>
        <div class="control">
          <span class="control-label">key</span>
          <span class="key-pill">&rarr;</span>
        </div>
      </div>
    </div>
    <div class="panel-row">
      <div class="row-key">
        <strong>Back</strong>
        <span>&minus;10s per press</span>
      </div>
      <div class="row-controls">
        <div class="control">
          <span class="control-label">seconds</span>
          <div class="step">
            <button class="step-btn">&minus;</button>
            <span class="step-value">10s</span>
            <button class="step-btn">+</button>
          </div>
        </div>
        <div class="control">
          <span class="control-label">key</span>
          <span class="key-pill">&larr;</span>
        </div>
      </div>
    </div>
  </div>

  </div>

  <script>
    document.querySelectorAll('button').forEach(el => {
      el.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); });
      el.tabIndex = -1;
    });

    /* Scale panel-wrap (logo + panel) to fit available space below the JSX title. */
    (function () {
      function fit() {
        var w = window.innerWidth, h = window.innerHeight;
        if (w <= 0 || h <= 0) return;
        var wrap = document.querySelector('.panel-wrap');
        if (!wrap) return;
        wrap.style.transform = '';
        var rw = wrap.scrollWidth, rh = wrap.scrollHeight;
        if (rw <= 0 || rh <= 0) return;
        var availW = w - 88;          // 44 each side
        var availH = h * 0.92;
        var s = Math.min(1, availW / rw, availH / rh);
        if (s <= 0) return;
        wrap.style.transform = 'scale(' + s + ')';
      }
      window.addEventListener('resize', fit);
      window.addEventListener('load', fit);
      if (window.ResizeObserver) new ResizeObserver(fit).observe(document.documentElement);
      fit();
    }());
  </script>
</body>
</html>
