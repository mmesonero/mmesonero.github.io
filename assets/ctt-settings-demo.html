<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claude Token Tracker, Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0D0D0D; }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #FFFDF7;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      overflow: hidden;
    }

    /* Window chrome */
    .window {
      width: 440px;
      max-width: 100%;
      background: #0F0E0D;
      border-radius: 12px;
      overflow: hidden;
      box-shadow:
        0 40px 100px rgba(0,0,0,0.7),
        0 0 0 1px rgba(255,255,255,0.04);
    }
    .titlebar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #1a1817;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .titlebar-icon { width: 14px; height: 14px; flex-shrink: 0; }
    .titlebar-icon img { width: 100%; height: 100%; display: block; }
    .titlebar-title {
      flex: 1;
      font-size: 11.5px;
      color: rgba(255,253,247,0.6);
      letter-spacing: 0.2px;
    }
    .titlebar-actions {
      display: flex;
      gap: 8px;
      color: rgba(255,253,247,0.45);
    }
    .titlebar-actions span {
      width: 14px; height: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .body { padding: 22px 22px 18px; }

    /* Page header, copy from options.html structure */
    .page-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .logo {
      width: 36px; height: 36px;
      flex-shrink: 0;
    }
    .page-head h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }
    .page-head p {
      font-size: 11.5px;
      color: rgba(255,253,247,0.35);
      margin-top: 1px;
    }

    /* Cards */
    .card {
      background: rgba(255,253,247,0.03);
      border: 1px solid rgba(255,253,247,0.06);
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 12px;
    }
    .card:last-child { margin-bottom: 0; }
    .card h2 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2px;
      color: rgba(255,253,247,0.85);
      margin-bottom: 4px;
    }
    .card .hint {
      font-size: 10.5px;
      color: rgba(255,253,247,0.35);
      line-height: 1.5;
      margin-bottom: 14px;
    }

    /* Field row */
    .field-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-top: 1px solid rgba(255,253,247,0.05);
    }
    .field-row:first-of-type { border-top: 0; }
    .field-row label {
      flex: 1;
      font-size: 11.5px;
      color: rgba(255,253,247,0.75);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .field-hint {
      font-size: 9.5px;
      color: rgba(255,253,247,0.3);
      font-weight: 400;
    }
    .input {
      width: 130px;
      background: rgba(255,253,247,0.06);
      border: 1px solid rgba(255,253,247,0.1);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      color: rgba(255,253,247,0.9);
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-family: ui-monospace, 'JetBrains Mono', monospace;
    }

    /* Presets */
    .presets {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      margin-top: 8px;
    }
    .preset-grp {
      display: flex;
      gap: 6px;
    }
    .preset-btn {
      background: rgba(255,253,247,0.05);
      border: 1px solid rgba(255,253,247,0.1);
      border-radius: 6px;
      color: rgba(255,253,247,0.7);
      font-size: 11px;
      font-weight: 500;
      padding: 5px 12px;
      cursor: pointer;
    }
    .preset-btn.active {
      background: rgba(212,103,15,0.12);
      border-color: rgba(212,103,15,0.45);
      color: #F59E0B;
    }
    .preset-btn:hover { color: rgba(255,253,247,0.95); }
    .preset-btn.active:hover { color: #F59E0B; }

    .field-label {
      font-size: 11.5px;
      color: rgba(255,253,247,0.75);
    }

    /* Actions */
    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }
    .btn-primary {
      background: #D4670F;
      border: none;
      color: #fff;
      border-radius: 7px;
      padding: 7px 16px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-primary:hover { background: #B85A0A; }
    .save-status {
      font-size: 10.5px;
      color: #4ADE80;
      font-family: ui-monospace, 'JetBrains Mono', monospace;
    }

    /* Stat rows */
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 7px 0;
      border-top: 1px solid rgba(255,253,247,0.05);
    }
    .stat-row:first-of-type { border-top: 0; }
    .stat-row span {
      font-size: 11.5px;
      color: rgba(255,253,247,0.5);
    }
    .stat-row strong {
      font-size: 12px;
      color: rgba(255,253,247,0.9);
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <div class="titlebar-icon"><img src="ctt-icon.png" alt="" /></div>
      <span class="titlebar-title">Settings &middot; Claude Token Tracker</span>
      <div class="titlebar-actions">
        <span>&#8211;</span>
        <span>&#9744;</span>
        <span>&#10005;</span>
      </div>
    </div>

    <div class="body">
      <div class="page-head">
        <svg class="logo" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" fill="#D4670F"/>
          <rect x="7" y="14" width="3" height="4" rx="1" fill="white" opacity="0.9"/>
          <rect x="10.5" y="10" width="3" height="8" rx="1" fill="white" opacity="0.9"/>
          <rect x="14" y="7" width="3" height="11" rx="1" fill="white" opacity="0.9"/>
        </svg>
        <div>
          <h1>Claude Token Tracker</h1>
          <p>Settings &amp; data</p>
        </div>
      </div>

      <div class="card">
        <h2>Token limits</h2>
        <p class="hint">Anthropic doesn't expose exact plan limits. Set values that match your subscription.</p>

        <div class="field-row">
          <label>
            Daily limit
            <span class="field-hint">tokens / day</span>
          </label>
          <input class="input" value="1,000,000" />
        </div>
        <div class="field-row">
          <label>
            Weekly limit
            <span class="field-hint">tokens / week</span>
          </label>
          <input class="input" value="7,000,000" />
        </div>

        <div class="presets">
          <span class="field-label">Quick presets</span>
          <div class="preset-grp">
            <button class="preset-btn active">Pro</button>
            <button class="preset-btn">Team</button>
            <button class="preset-btn">Enterprise</button>
          </div>
        </div>

        <div class="actions">
          <button class="btn-primary">Save limits</button>
          <span class="save-status">&#10003; Saved</span>
        </div>
      </div>

      <div class="card">
        <h2>Data</h2>
        <div class="stat-row">
          <span>Tracked since</span>
          <strong>Mar 14, 2026</strong>
        </div>
        <div class="stat-row">
          <span>Days with data</span>
          <strong>78</strong>
        </div>
        <div class="stat-row">
          <span>All-time total</span>
          <strong>14.2M tokens</strong>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('button, input').forEach(el => {
      el.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); });
      el.tabIndex = -1;
    });
  </script>
</body>
</html>
