<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CleanFeed Speed Thumb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0B0B0B;
      --surface: #18181b;
      --surface-soft: #1f1f23;
      --border: #2a2a2f;
      --text: #f0ede8;
      --desc: #7d7975;
      --muted: #5a5a62;
      --gold: #d4a84b;
      --gold-soft: rgba(212,168,75,0.13);
      --radius: 10px;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --mono: ui-monospace, 'JetBrains Mono', Menlo, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 64px;
      gap: 40px;
      overflow: hidden;
    }

    .hero { text-align: center; }
    .label {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .title {
      font-family: var(--serif);
      font-weight: 300;
      font-size: 64px;
      line-height: 1.05;
      letter-spacing: -0.8px;
      color: var(--text);
    }
    .title em { font-style: italic; color: var(--gold); }
    .subtitle {
      margin-top: 18px;
      font-size: 16px;
      line-height: 1.55;
      color: var(--desc);
    }

    .demo-row {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 56px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 520px;
      overflow: hidden;
    }
    .panel-head { padding: 18px 22px; border-bottom: 1px solid var(--border); }
    .panel-title { font-size: 17px; font-weight: 600; color: var(--text); }
    .panel-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
    }
    .panel-row:last-child { border-bottom: 0; }
    .row-key { flex: 1; }
    .row-key strong {
      display: block;
      font-size: 17px;
      font-weight: 700;
      color: var(--gold);
    }
    .row-key span {
      display: block;
      margin-top: 2px;
      font-size: 12px;
      color: var(--desc);
    }
    .row-controls { display: flex; gap: 10px; align-items: center; }
    .control { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .control-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .step { display: flex; align-items: center; gap: 4px; }
    .step-btn {
      width: 26px; height: 26px;
      border-radius: 6px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      color: var(--desc);
      font-size: 14px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .step-value {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--gold);
      background: var(--gold-soft);
      border: 1px solid rgba(212,168,75,0.3);
      border-radius: 6px;
      padding: 4px 10px;
      min-width: 56px;
      text-align: center;
    }
    .key-pill {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text);
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 14px;
      min-width: 40px;
      text-align: center;
    }

    .hud-wrap { display: flex; flex-direction: column; gap: 7px; width: 232px; }
    .hud-tag {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .hud-pill {
      background: rgba(8,8,10,0.85);
      color: #fff;
      font: 600 12px/1 var(--mono);
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      min-width: 40px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      align-self: flex-start;
    }
    .hud-menu {
      background: rgba(8,8,10,0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.55);
    }
    .hud-label-row { display: flex; justify-content: space-between; align-items: center; }
    .hud-label-row .lbl {
      font: 500 10px/1 var(--mono);
      color: rgba(255,255,255,0.65);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .hud-label-row .reset {
      font: 500 10px/1 var(--mono);
      color: rgba(255,255,255,0.55);
    }
    .hud-speed {
      text-align: center;
      font: 700 22px/1 var(--mono);
      color: #fff;
      padding: 2px 0;
    }
    .hud-slider { display: flex; align-items: center; gap: 10px; }
    .hud-slider-btn {
      width: 22px; height: 22px;
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .hud-track { flex: 1; position: relative; height: 20px; display: flex; align-items: center; }
    .hud-track-bg { position: absolute; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.12); border-radius: 999px; }
    .hud-track-fill { position: absolute; left: 0; height: 3px; width: 7.7%; background: var(--gold); border-radius: 999px; }
    .hud-thumb {
      position: absolute;
      width: 22px; height: 22px;
      object-fit: contain;
      filter: drop-shadow(0 1px 4px rgba(0,0,0,0.9));
      left: 7.7%;
      transform: translate(-50%, -50%);
      top: 50%;
    }
    .hud-presets { display: flex; gap: 4px; }
    .hud-preset {
      flex: 1;
      text-align: center;
      font: 600 11px/1 var(--mono);
      color: rgba(255,255,255,0.7);
      padding: 5px 2px;
      border-radius: 5px;
      border: 1px solid transparent;
    }
    .hud-preset.active {
      color: var(--gold);
      background: rgba(212,168,75,0.12);
      border-color: rgba(212,168,75,0.35);
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="label">VIDEO SPEED CONTROL</div>
    <div class="title">Watch at your own <em>pace.</em></div>
    <div class="subtitle">Keyboard shortcuts for playback speed.<br/>Works on any video site.</div>
  </div>

  <div class="demo-row">
    <div class="panel">
      <div class="panel-head"><div class="panel-title">Speed Configuration</div></div>
      <div class="panel-row">
        <div class="row-key">
          <strong>Up</strong>
          <span>+0.25&times; per press</span>
        </div>
        <div class="row-controls">
          <div class="control">
            <span class="control-label">step size</span>
            <div class="step">
              <button class="step-btn">&minus;</button>
              <span class="step-value">0.25&times;</span>
              <button class="step-btn">+</button>
            </div>
          </div>
          <div class="control">
            <span class="control-label">key</span>
            <span class="key-pill">+</span>
          </div>
        </div>
      </div>
      <div class="panel-row">
        <div class="row-key">
          <strong>Down</strong>
          <span>&minus;0.25&times; per press</span>
        </div>
        <div class="row-controls">
          <div class="control">
            <span class="control-label">step size</span>
            <div class="step">
              <button class="step-btn">&minus;</button>
              <span class="step-value">0.25&times;</span>
              <button class="step-btn">+</button>
            </div>
          </div>
          <div class="control">
            <span class="control-label">key</span>
            <span class="key-pill">&minus;</span>
          </div>
        </div>
      </div>
    </div>

    <div class="hud-wrap">
      <div class="hud-tag">On every video</div>
      <div class="hud-pill">1&times;</div>
      <div class="hud-menu">
        <div class="hud-label-row">
          <span class="lbl">Velocidad</span>
          <span class="reset">reset</span>
        </div>
        <div class="hud-speed">1&times;</div>
        <div class="hud-slider">
          <span class="hud-slider-btn">&minus;</span>
          <div class="hud-track">
            <div class="hud-track-bg"></div>
            <div class="hud-track-fill"></div>
            <img class="hud-thumb" src="cleanfeed-logo.png" alt="" />
          </div>
          <span class="hud-slider-btn">+</span>
        </div>
        <div class="hud-presets">
          <span class="hud-preset active">1&times;</span>
          <span class="hud-preset">2&times;</span>
          <span class="hud-preset">4&times;</span>
          <span class="hud-preset">6&times;</span>
          <span class="hud-preset">10&times;</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
