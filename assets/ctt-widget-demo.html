<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claude Token Tracker, Inline Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0D0D0D;
      color: #f5f4f1;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 300;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 90px 80px 32px;
      gap: 18px;
    }
    .content-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
      transform-origin: center center;
    }

    /* Greeting */
    .greeting {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 30px;
      letter-spacing: -0.4px;
      color: #f5f4f1;
      text-align: center;
    }
    .claude-logo {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    /* Chat box */
    .chat {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .chat-box {
      background: #1A1A17;
      border: 1px solid #3a3835;
      border-radius: 20px;
      padding: 22px 22px 16px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    }
    .chat-input {
      color: rgba(255,255,255,0.55);
      font-size: 18px;
      font-weight: 300;
      padding: 6px 4px 32px;
    }
    .chat-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .toolbar-left .plus {
      width: 26px;
      height: 26px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.5);
      font-size: 16px;
      cursor: pointer;
    }
    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
      color: rgba(255,255,255,0.55);
      font-size: 12.5px;
    }
    .model-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .model-pill .high {
      color: #e2ba6b;
    }
    .icon-mic, .icon-voice {
      width: 16px;
      height: 16px;
      color: rgba(255,255,255,0.5);
    }

    /* CTT widget bar (REAL CSS from content.js) */
    #ctt-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 6px 16px;
      margin: 0 8px;
      font-family: inherit;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      -webkit-font-smoothing: antialiased;
      letter-spacing: 0.01em;
    }
    .ctt-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ctt-lbl {
      font-size: 12.5px;
      white-space: nowrap;
      opacity: 0.85;
    }
    .ctt-track {
      width: 140px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 100px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .ctt-fill {
      height: 100%;
      border-radius: 100px;
      transition: width 0.5s ease;
    }
    .ctt-fill.orange { background: #D97706; }
    .ctt-fill.blue   { background: #3B82F6; }
    .ctt-val {
      font-size: 10.5px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .ctt-sep {
      width: 1px;
      height: 11px;
      background: rgba(255,255,255,0.12);
      flex-shrink: 0;
      margin: 0 1px;
    }

    /* Action buttons */
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .action {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 12.5px;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: background .2s, border-color .2s, color .2s;
    }
    .action:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.2);
      color: #f5f4f1;
    }
    .action svg {
      width: 13px;
      height: 13px;
      opacity: 0.7;
    }

    /* Annotation arrow */
    .arrow-note {
      position: absolute;
      bottom: 96px;
      left: 50%;
      transform: translateX(-50%) translateY(0);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: 14px;
      color: #e2ba6b;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      animation: arrowBob 2.4s ease-in-out infinite;
      opacity: 0.92;
    }
    .arrow-note svg {
      width: 24px;
      height: 24px;
      color: #e2ba6b;
    }
    @keyframes arrowBob {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(-5px); }
    }

    @media (max-width: 600px) {
      body { padding: 70px 14px 14px; gap: 12px; justify-content: flex-start; }
      .greeting { font-size: 22px; gap: 10px; }
      .claude-logo { width: 24px; height: 24px; }
      .chat-box { padding: 12px 12px 10px; border-radius: 14px; }
      .chat-input { font-size: 11.5px; padding: 2px 2px 14px; }
      .chat-toolbar { gap: 6px; }
      .toolbar-left .plus { width: 20px; height: 20px; font-size: 12px; }
      .toolbar-right { gap: 8px; font-size: 9.5px; }
      .icon-mic, .icon-voice { width: 12px; height: 12px; }
      #ctt-bar { gap: 6px; padding: 4px 8px; font-size: 9px; }
      .ctt-lbl { font-size: 8.5px; }
      .ctt-val { font-size: 8.5px; }
      .ctt-track { width: 60px; height: 2.5px; }
    }
  </style>
</head>
<body>
  <div class="content-wrap">
  <div class="greeting">
    <img class="claude-logo" src="claude-logo.svg" alt="Claude" />
    <span>&iexcl;Manuel Mesonero Medina ha vuelto!</span>
  </div>

  <div class="chat">
    <div class="chat-box">
      <div class="chat-input">&iquest;C&oacute;mo puedo ayudarle hoy?</div>
      <div class="chat-toolbar">
        <div class="toolbar-left">
          <span class="plus">+</span>
        </div>
        <div class="toolbar-right">
          <span class="model-pill">Sonnet 4.6 <span class="high">Alto</span> &#x25BE;</span>
          <svg class="icon-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
          <svg class="icon-voice" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="6" y1="9" x2="6" y2="15"/><line x1="10" y1="5" x2="10" y2="19"/><line x1="14" y1="9" x2="14" y2="15"/><line x1="18" y1="11" x2="18" y2="13"/></svg>
        </div>
      </div>
    </div>

    <!-- The CTT widget injected exactly as content.js does -->
    <div id="ctt-bar">
      <div class="ctt-group">
        <span class="ctt-lbl">5h limit</span>
        <div class="ctt-track"><div class="ctt-fill orange" style="width:100%"></div></div>
        <span class="ctt-val">100%</span>
      </div>
      <div class="ctt-sep"></div>
      <div class="ctt-group">
        <span class="ctt-lbl">Weekly</span>
        <div class="ctt-track"><div class="ctt-fill blue" style="width:76%"></div></div>
        <span class="ctt-val">76%</span>
      </div>
    </div>
  </div>
  </div>

  <script>
    /* Scale content to fit available iframe area (below JSX title overlay). */
    (function () {
      function fit() {
        var w = window.innerWidth, h = window.innerHeight;
        if (w <= 0 || h <= 0) return;
        var wrap = document.querySelector('.content-wrap');
        if (!wrap) return;
        wrap.style.transform = '';
        var rw = wrap.scrollWidth, rh = wrap.scrollHeight;
        if (rw <= 0 || rh <= 0) return;
        var availW = w - 160;   // 80 each side
        var availH = h - 138;   // 110 top + 28 bottom
        var s = Math.min(1, availW / rw, availH / rh);
        if (s <= 0) return;
        wrap.style.transform = 'scale(' + s + ')';
      }
      window.addEventListener('resize', fit);
      window.addEventListener('load', fit);
      if (window.ResizeObserver) new ResizeObserver(fit).observe(document.documentElement);
      fit();
    }());
  </script>
</body>
</html>
