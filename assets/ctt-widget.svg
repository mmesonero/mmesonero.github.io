<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A1917"/>
      <stop offset="100%" stop-color="#111110"/>
    </radialGradient>
    <!-- bar gradients -->
    <linearGradient id="bar-orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4670F"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="bar-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Sidebar simulation (left panel) -->
  <rect x="0" y="0" width="240" height="900" fill="rgba(0,0,0,0.25)"/>
  <rect x="240" y="0" width="1" height="900" fill="rgba(255,253,247,0.06)"/>

  <!-- Sidebar items -->
  <rect x="20" y="30" width="200" height="36" rx="8" fill="rgba(255,253,247,0.06)"/>
  <text x="120" y="53" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,253,247,0.5)">New conversation</text>

  <rect x="20" y="80" width="200" height="28" rx="6" fill="rgba(255,253,247,0.04)"/>
  <text x="36" y="99" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,253,247,0.25)">● Today</text>
  <rect x="20" y="116" width="200" height="22" rx="5" fill="rgba(255,253,247,0.03)"/>
  <text x="36" y="132" font-family="system-ui, sans-serif" font-size="11.5" fill="rgba(255,253,247,0.2)">Draft analysis on Q3...</text>
  <rect x="20" y="146" width="200" height="22" rx="5" fill="rgba(255,253,247,0.03)"/>
  <text x="36" y="162" font-family="system-ui, sans-serif" font-size="11.5" fill="rgba(255,253,247,0.15)">Explain this function</text>
  <rect x="20" y="176" width="200" height="22" rx="5"/>
  <text x="36" y="192" font-family="system-ui, sans-serif" font-size="11.5" fill="rgba(255,253,247,0.12)">Refactor auth module</text>

  <!-- Main chat area -->
  <!-- Message bubble — assistant -->
  <rect x="310" y="180" width="820" height="120" rx="12" fill="rgba(255,253,247,0.04)" filter="url(#shadow)"/>
  <text x="338" y="214" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,253,247,0.65)">Here's a breakdown of the architecture:</text>
  <rect x="338" y="230" width="580" height="10" rx="5" fill="rgba(255,253,247,0.10)"/>
  <rect x="338" y="250" width="440" height="10" rx="5" fill="rgba(255,253,247,0.07)"/>
  <rect x="338" y="270" width="510" height="10" rx="5" fill="rgba(255,253,247,0.07)"/>

  <!-- Message bubble — user -->
  <rect x="780" y="340" width="360" height="52" rx="12" fill="rgba(212,103,15,0.18)" stroke="rgba(212,103,15,0.2)" stroke-width="1"/>
  <text x="960" y="371" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13.5" fill="rgba(255,253,247,0.75)">Can you show me a code example?</text>

  <!-- Chat input box -->
  <rect x="310" y="720" width="820" height="60" rx="14" fill="rgba(255,253,247,0.05)" stroke="rgba(255,253,247,0.10)" stroke-width="1" filter="url(#shadow)"/>
  <text x="338" y="756" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,253,247,0.22)">Message Claude…</text>
  <!-- Send button -->
  <rect x="1078" y="734" width="36" height="32" rx="8" fill="rgba(255,253,247,0.08)"/>
  <polygon points="1090,743 1102,750 1090,757" fill="rgba(255,253,247,0.3)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- WIDGET — the injected bar below the input -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="310" y="792" width="820" height="52" rx="10" fill="rgba(255,253,247,0.025)" stroke="rgba(255,253,247,0.07)" stroke-width="1"/>

  <!-- 5H label -->
  <text x="330" y="820" font-family="system-ui, sans-serif" font-size="10.5" font-weight="600" letter-spacing="0.8" fill="rgba(255,253,247,0.38)" text-transform="uppercase">5H</text>

  <!-- Orange bar track -->
  <rect x="358" y="813" width="200" height="4" rx="2" fill="rgba(255,253,247,0.07)"/>
  <!-- Orange bar fill (67%) -->
  <rect x="358" y="813" width="134" height="4" rx="2" fill="url(#bar-orange)"/>

  <!-- 5H percentage -->
  <text x="568" y="820" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="rgba(255,253,247,0.65)">67%</text>

  <!-- 5H reset -->
  <text x="610" y="820" font-family="system-ui, sans-serif" font-size="10.5" fill="rgba(255,253,247,0.25)">Resets Wed 04:40</text>

  <!-- Divider -->
  <line x1="750" y1="806" x2="750" y2="832" stroke="rgba(255,253,247,0.10)" stroke-width="1"/>

  <!-- WEEKLY label -->
  <text x="765" y="820" font-family="system-ui, sans-serif" font-size="10.5" font-weight="600" letter-spacing="0.8" fill="rgba(255,253,247,0.38)">WEEKLY</text>

  <!-- Blue bar track -->
  <rect x="826" y="813" width="180" height="4" rx="2" fill="rgba(255,253,247,0.07)"/>
  <!-- Blue bar fill (23%) -->
  <rect x="826" y="813" width="41" height="4" rx="2" fill="url(#bar-blue)"/>

  <!-- Weekly percentage -->
  <text x="1016" y="820" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="rgba(255,253,247,0.65)">23%</text>

  <!-- Weekly reset -->
  <text x="1054" y="820" font-family="system-ui, sans-serif" font-size="10.5" fill="rgba(255,253,247,0.25)">Resets Sun 00:00</text>

  <!-- Second row: reset time context -->
  <text x="330" y="836" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,253,247,0.18)">5-hour window · Updated just now</text>

  <!-- Label callout -->
  <rect x="1150" y="790" width="210" height="54" rx="8" fill="rgba(212,103,15,0.10)" stroke="rgba(212,103,15,0.3)" stroke-width="1"/>
  <text x="1255" y="816" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11.5" font-weight="600" fill="rgba(212,103,15,0.9)">Inline usage widget</text>
  <text x="1255" y="834" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10.5" fill="rgba(255,253,247,0.35)">injected below the input</text>
  <!-- Arrow pointing left -->
  <line x1="1148" y1="817" x2="1132" y2="817" stroke="rgba(212,103,15,0.6)" stroke-width="1.5"/>
  <polygon points="1128,813 1128,821 1136,817" fill="rgba(212,103,15,0.6)"/>
</svg>
