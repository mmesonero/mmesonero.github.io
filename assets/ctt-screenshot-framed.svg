<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bar-red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#F87171"/>
    </linearGradient>
    <linearGradient id="bar-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="fade-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1917" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1a1917" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="#080807"/>

  <!-- LEFT TEXT -->
  <rect x="80" y="268" width="48" height="3" rx="2" fill="#D4670F" opacity="0.85"/>
  <text x="80" y="293" font-family="Georgia, serif" font-size="13" letter-spacing="2" fill="rgba(255,253,247,0.30)">WIDGET</text>
  <text x="80" y="372" font-family="Georgia, serif" font-size="68" font-style="italic" letter-spacing="-1.5" fill="rgba(255,253,247,0.92)">Always there.</text>
  <text x="80" y="452" font-family="Georgia, serif" font-size="68" font-style="italic" letter-spacing="-1.5" fill="rgba(255,253,247,0.92)">Below your chat.</text>
  <text x="80" y="516" font-family="system-ui, sans-serif" font-size="18" font-weight="300" fill="rgba(255,253,247,0.32)" letter-spacing="-0.2">Injected below the message input</text>
  <text x="80" y="544" font-family="system-ui, sans-serif" font-size="18" font-weight="300" fill="rgba(255,253,247,0.32)" letter-spacing="-0.2">5-hour and weekly limits, live</text>

  <!-- RIGHT: claude.ai UI simulation, x=740 to x=1560 -->
  <rect x="740" y="0" width="820" height="900" fill="#1a1917"/>

  <!-- Minimal faded chat above -->
  <rect x="780" y="140" width="700" height="55" rx="10" fill="rgba(255,255,255,0.025)"/>
  <rect x="806" y="158" width="380" height="8" rx="4" fill="rgba(255,255,255,0.07)"/>
  <rect x="806" y="175" width="260" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>

  <rect x="1040" y="218" width="420" height="48" rx="12" fill="rgba(212,103,15,0.12)" stroke="rgba(212,103,15,0.14)" stroke-width="1"/>
  <rect x="1062" y="235" width="240" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="1062" y="253" width="160" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>

  <!-- Fade chat out -->
  <rect x="740" y="130" width="820" height="220" fill="url(#fade-top)"/>

  <!-- Input box — faithful claude.ai style -->
  <rect x="780" y="390" width="740" height="110" rx="18" fill="#242220" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  <text x="818" y="432" font-family="system-ui, sans-serif" font-size="17" fill="rgba(255,255,255,0.22)">Como puedo ayudarle hoy?</text>
  <!-- toolbar -->
  <rect x="800" y="462" width="32" height="26" rx="7" fill="rgba(255,255,255,0.06)"/>
  <text x="816" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" fill="rgba(255,255,255,0.28)">+</text>
  <rect x="846" y="462" width="162" height="26" rx="7" fill="rgba(255,255,255,0.06)"/>
  <text x="927" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.38)">Opus 4.8  High</text>
  <!-- mic -->
  <circle cx="1470" cy="475" r="13" fill="rgba(255,255,255,0.06)"/>
  <rect x="1464" y="465" width="12" height="13" rx="6" fill="rgba(255,255,255,0.28)"/>
  <path d="M1459 476 Q1459 486 1470 486 Q1481 486 1481 476" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" fill="none"/>
  <!-- waveform bars -->
  <circle cx="1500" cy="475" r="13" fill="rgba(255,255,255,0.06)"/>
  <rect x="1490" y="472" width="3" height="6" rx="2" fill="rgba(255,255,255,0.20)"/>
  <rect x="1495" y="468" width="3" height="14" rx="2" fill="rgba(255,255,255,0.30)"/>
  <rect x="1500" y="470" width="3" height="10" rx="2" fill="rgba(255,255,255,0.28)"/>
  <rect x="1505" y="472" width="3" height="6" rx="2" fill="rgba(255,255,255,0.18)"/>
  <rect x="1510" y="474" width="3" height="3" rx="2" fill="rgba(255,255,255,0.12)"/>

  <!-- WIDGET BAR — big, prominent -->
  <rect x="780" y="516" width="740" height="82" rx="12" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>

  <!-- 5h limit row -->
  <text x="808" y="548" font-family="system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.5" fill="rgba(255,255,255,0.42)">5h limit</text>
  <rect x="884" y="542" width="280" height="5" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="884" y="542" width="280" height="5" rx="3" fill="url(#bar-red)"/>
  <text x="1174" y="549" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.65)">100%</text>
  <text x="1228" y="549" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.28)">&#183; Fri 17:50</text>

  <!-- divider -->
  <line x1="808" y1="567" x2="1500" y2="567" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Weekly row -->
  <text x="808" y="588" font-family="system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.5" fill="rgba(255,255,255,0.42)">Weekly</text>
  <rect x="884" y="582" width="280" height="5" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="884" y="582" width="73" height="5" rx="3" fill="url(#bar-blue)"/>
  <text x="1174" y="589" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.65)">26%</text>
  <text x="1218" y="589" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.28)">&#183; Mon 15:00</text>
</svg>