<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CleanFeed Speed Demo</title>
  <style>
    :root {
      --bg: #0D0D0D;
      --surface: #1A1A17;
      --surface-soft: #1A1A17;
      --border: #2a2a2f;
      --text: #f0ede8;
      --desc: #7d7975;
      --muted: #5a5a62;
      --gold: #e2ba6b;
      --gold-soft: rgba(226, 186, 107,0.13);
      --radius: 10px;
      --serif: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 44px 44px;
      position: relative;
      overflow: hidden;
    }
    .demo-row { transform-origin: center center; }

    .hero-text {
      text-align: center;
      max-width: 760px;
    }
    .label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .title {
      font-family: var(--serif);
      font-weight: 300;
      font-size: clamp(30px, 7.5vh, 64px);
      line-height: 1.05;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .title em {
      font-style: italic;
      color: var(--gold);
    }
    .subtitle {
      margin-top: 18px;
      font-size: 16px;
      line-height: 1.55;
      color: var(--desc);
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Layout: panel left, bubble+menu right */
    .demo-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      flex-wrap: nowrap;
    }

    /* Speed Configuration panel — sits TOP */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 720px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .panel-head {
      padding: 14px 22px;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.1px;
    }
    .panel-row {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 16px 22px;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    .panel-row:hover { background: rgba(255,255,255,0.02); }
    .panel-row:last-child { border-bottom: 0; }
    .row-key {
      flex: 1;
      min-width: 0;
    }
    .row-key strong {
      display: block;
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.1px;
    }
    .row-key span {
      display: block;
      margin-top: 3px;
      font-size: 15px;
      color: var(--desc);
    }
    .row-controls {
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .control {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .control-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.2px;
      color: var(--muted);
      font-weight: 400;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .step-btn {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
    }
    .step-btn:hover { color: var(--gold); border-color: var(--gold); background: var(--gold-soft); }
    .step-value {
      font-family: var(--mono);
      font-size: 17px;
      font-weight: 700;
      color: var(--gold);
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 14px;
      min-width: 70px;
      text-align: center;
    }
    .key-pill {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--gold);
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 18px;
      min-width: 52px;
      text-align: center;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      cursor: pointer;
    }
    .key-pill:hover { border-color: var(--gold); background: var(--gold-soft); }

    /* Floating bubble HUD, matches content/video.js styling */
    .hud-wrap {
      display: flex;
      flex-direction: column;
      gap: 7px;
      align-items: flex-start;
      width: 232px;
      margin-top: -4px;
    }
    .hud-pill {
      background: rgba(8,8,10,0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #fff;
      font: 600 12px/1 var(--mono);
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      letter-spacing: 0.5px;
      min-width: 40px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .hud-menu {
      background: rgba(8,8,10,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      box-shadow: 0 18px 50px rgba(0,0,0,0.55);
    }
    .hud-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .hud-label-row .lbl {
      font: 500 10px/1 var(--mono);
      color: rgba(255,255,255,0.65);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .hud-label-row .reset {
      font: 500 10px/1 var(--mono);
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.5px;
      cursor: pointer;
    }
    .hud-speed {
      text-align: center;
      font: 700 22px/1 var(--mono);
      color: #fff;
      letter-spacing: -0.3px;
      padding: 2px 0;
    }
    .hud-slider {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hud-slider-btn {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .hud-track {
      flex: 1;
      position: relative;
      height: 20px;
      display: flex;
      align-items: center;
    }
    .hud-track-bg {
      position: absolute;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
    }
    .hud-track-fill {
      position: absolute;
      left: 0;
      height: 3px;
      width: 7.7%;
      background: var(--gold);
      border-radius: 999px;
    }
    .hud-thumb {
      position: absolute;
      width: 22px;
      height: 22px;
      object-fit: contain;
      filter: drop-shadow(0 1px 4px rgba(0,0,0,0.9));
      left: 7.7%;
      transform: translate(-50%, -50%);
      top: 50%;
      cursor: grab;
    }
    .hud-presets {
      display: flex;
      gap: 4px;
    }
    .hud-preset {
      flex: 1;
      text-align: center;
      font: 600 11px/1 var(--mono);
      color: rgba(255,255,255,0.7);
      padding: 5px 2px;
      border-radius: 5px;
      border: 1px solid transparent;
      cursor: pointer;
    }
    .hud-preset.active {
      color: var(--gold);
      background: rgba(226, 186, 107,0.12);
      border-color: rgba(226, 186, 107,0.35);
    }

    /* Caller label above bubble */
    .hud-tag {
      font-size: 11px;
      letter-spacing: 0.2px;
      color: #f0ede8;
      font-weight: 500;
      margin-bottom: 6px;
    }

    @media (max-width: 880px) {
      .title { font-size: 44px; }
      .demo-row { gap: 28px; }
    }
    @media (max-width: 600px) {
      .demo-row { gap: 20px; }
      .panel-row { padding: 12px 10px; }
    }
  </style>
</head>
<body>
  <div class="demo-row">
    <!-- Speed Configuration panel -->
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Speed Configuration</div>
      </div>
      <div class="panel-row">
        <div class="row-key">
          <strong>Up</strong>
          <span>+0.25&times; per press</span>
        </div>
        <div class="row-controls">
          <div class="control">
            <span class="control-label">step size</span>
            <div class="step">
              <button class="step-btn">&minus;</button>
              <span class="step-value">0.25&times;</span>
              <button class="step-btn">+</button>
            </div>
          </div>
          <div class="control">
            <span class="control-label">key</span>
            <span class="key-pill">+</span>
          </div>
        </div>
      </div>
      <div class="panel-row">
        <div class="row-key">
          <strong>Down</strong>
          <span>&minus;0.25&times; per press</span>
        </div>
        <div class="row-controls">
          <div class="control">
            <span class="control-label">step size</span>
            <div class="step">
              <button class="step-btn">&minus;</button>
              <span class="step-value">0.25&times;</span>
              <button class="step-btn">+</button>
            </div>
          </div>
          <div class="control">
            <span class="control-label">key</span>
            <span class="key-pill">&minus;</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Floating bubble HUD -->
    <div class="hud-wrap">
      <div class="hud-menu">
        <div class="hud-label-row">
          <span class="lbl">Velocidad</span>
          <span class="reset">reset</span>
        </div>
        <div class="hud-speed">1&times;</div>
        <div class="hud-slider">
          <span class="hud-slider-btn">&minus;</span>
          <div class="hud-track">
            <div class="hud-track-bg"></div>
            <div class="hud-track-fill"></div>
            <img class="hud-thumb" src="cleanfeed-logo.png" alt="" />
          </div>
          <span class="hud-slider-btn">+</span>
        </div>
        <div class="hud-presets">
          <span class="hud-preset active">1&times;</span>
          <span class="hud-preset">2&times;</span>
          <span class="hud-preset">4&times;</span>
          <span class="hud-preset">6&times;</span>
          <span class="hud-preset">10&times;</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('button, .hud-preset, .reset').forEach(el => {
      el.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); });
      el.tabIndex = -1;
    });

    /* Scale demo-row to fit lower half of slide (title takes top). */
    (function () {
      function fit() {
        var w = window.innerWidth, h = window.innerHeight;
        if (w <= 0 || h <= 0) return;
        var row = document.querySelector('.demo-row');
        if (!row) return;
        row.style.transform = '';
        var rw = row.scrollWidth, rh = row.scrollHeight;
        if (rw <= 0 || rh <= 0) return;
        var availW = w - 88;
        var availH = h * 0.92;
        var s = Math.min(1, availW / rw, availH / rh);
        if (s <= 0) return;
        row.style.transform = 'scale(' + s + ')';
      }
      window.addEventListener('resize', fit);
      window.addEventListener('load', fit);
      if (window.ResizeObserver) new ResizeObserver(fit).observe(document.documentElement);
      fit();
    }());
  </script>
</body>
</html>
