<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CleanFeed, Site blocked</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0D0D0D; }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 28px 80px 28px 24px;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 420px;
      flex-shrink: 0;
      text-align: center;
      transform-origin: center right;
    }

    .icon-ring {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 2px solid #e2ba6b;
      background: #1A1A17;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 28px #e2ba6b22;
    }
    .icon-ring img {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #e2ba6b;
      letter-spacing: 0.2px;
    }

    .subtitle {
      font-size: 15px;
      color: #888;
      line-height: 1.6;
      font-weight: 300;
    }
    .subtitle em {
      color: #e2ba6b;
      font-style: normal;
      font-weight: 500;
    }

    .pill {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 99px;
      border: 1px solid #2a2a2a;
      background: #1A1A17;
      font-size: 13px;
      color: #555;
      letter-spacing: 0.5px;
      font-weight: 400;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
      margin-top: 6px;
    }
    .stat-card {
      border: 1px solid #222;
      background: #1A1A17;
      padding: 14px 12px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #e2ba6b;
      letter-spacing: -0.5px;
      width: 100%;
      text-align: center;
    }
    .stat-label {
      font-size: 9.5px;
      color: #555;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 4px;
      font-weight: 500;
      width: 100%;
      text-align: center;
    }
    .stat-label small {
      display: block;
      font-size: 8.5px;
      color: #444;
      margin-top: 1px;
      text-align: center;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      margin-top: 6px;
    }
    .btn {
      width: 100%;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, border-color .2s, color .2s;
      font-family: inherit;
    }
    .btn-primary {
      background: transparent;
      border: 1px solid #e2ba6b;
      color: #e2ba6b;
    }
    .btn-primary:hover { background: rgba(226, 186, 107,0.08); }
    .btn-muted {
      background: #1A1A17;
      border: 1px solid #2a2a2a;
      color: #666;
    }
    .btn-muted:hover { color: #888; }

    @media (max-width: 380px) {
      body { padding: 2px 10px; }
      .container { gap: 5px; max-width: 100%; align-items: stretch; text-align: center; }
      h1 { font-size: 26px; }
      .subtitle { font-size: 14.5px; line-height: 1.2; }
      .pill { padding: 4px 14px; font-size: 13.5px; align-self: center; }
      .stats { gap: 6px; width: 100%; justify-items: stretch; }
      .stat-card { padding: 7px 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      .stat-value { font-size: 24px; text-align: center; }
      .stat-label { font-size: 9.5px; text-align: center; }
      .stat-label small { font-size: 8px; text-align: center; }
      .actions { gap: 5px; }
      .btn { padding: 7px 16px; font-size: 14px; }
      .icon-ring { width: 80px; height: 80px; align-self: center; }
      .icon-ring img { width: 50px; height: 50px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-ring">
      <img src="cleanfeed-logo.png" alt="CleanFeed" />
    </div>
    <h1>Site blocked</h1>
    <div class="subtitle">
      You decided not to go here.<br />
      <em>Your attention is worth more than this.</em>
    </div>
    <span class="pill">instagram.com</span>
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value">5</div>
        <div class="stat-label">Blocks<small>(Last 7d)</small></div>
      </div>
      <div class="stat-card">
        <div class="stat-value">0</div>
        <div class="stat-label">Bypasses<small>(Last 7d)</small></div>
      </div>
      <div class="stat-card">
        <div class="stat-value">4m</div>
        <div class="stat-label">Time spent<small>(Total)</small></div>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-primary">&larr; Go back</button>
      <button class="btn btn-muted">Continue anyway</button>
    </div>
  </div>

  <script>
    document.querySelectorAll('button').forEach(el => {
      el.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); });
      el.tabIndex = -1;
    });

    /* Scale content to fit right half of viewport (split slide). */
    (function () {
      function fit() {
        var w = window.innerWidth, h = window.innerHeight;
        if (w <= 0 || h <= 0) return;
        var c = document.querySelector('.container');
        if (!c) return;
        c.style.transform = '';
        var rw = c.scrollWidth, rh = c.scrollHeight;
        if (rw <= 0 || rh <= 0) return;
        // Use actual padding clearance, not viewport-fraction (otherwise scale
        // collapses when iframe shrinks past the 820px grid breakpoint).
        var availW = w - 104;   // 80 right + 24 left padding
        var availH = h * 0.82;
        var s = Math.min(1, availW / rw, availH / rh);
        if (s <= 0) return;
        c.style.transform = 'scale(' + s + ')';
      }
      window.addEventListener('resize', fit);
      window.addEventListener('load', fit);
      if (window.ResizeObserver) {
        new ResizeObserver(fit).observe(document.documentElement);
      }
      fit();
    }());
  </script>
</body>
</html>
