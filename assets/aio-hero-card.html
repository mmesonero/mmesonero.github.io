<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AIO Sync â€” Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1440px; height: 900px;
      background: #0D0D0D;
      color: #f5f4f1;
      font-family: 'Outfit', -apple-system, sans-serif;
      overflow: hidden;
    }

    /* RGB ambient glow strips */
    .glow-r {
      position: absolute;
      width: 700px; height: 500px;
      left: -120px; top: 160px;
      background: radial-gradient(ellipse at 60% 50%, rgba(255,55,55,0.14), transparent 65%);
      pointer-events: none;
    }
    .glow-g {
      position: absolute;
      width: 600px; height: 500px;
      left: 380px; top: 80px;
      background: radial-gradient(ellipse at 50% 60%, rgba(55,210,100,0.10), transparent 65%);
      pointer-events: none;
    }
    .glow-b {
      position: absolute;
      width: 700px; height: 500px;
      right: -100px; top: 180px;
      background: radial-gradient(ellipse at 40% 50%, rgba(55,110,255,0.13), transparent 65%);
      pointer-events: none;
    }

    /* App window floating in background */
    .app-window {
      position: absolute;
      top: 120px;
      left: 50%;
      transform: translateX(-50%);
      width: 860px;
      height: 480px;
      border-radius: 12px;
      background: #111113;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 60px 160px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.03);
      overflow: hidden;
      opacity: 0.42;
      filter: blur(0.5px);
    }
    .win-bar {
      height: 42px;
      background: rgba(255,255,255,0.025);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 8px;
    }
    .wdot { width: 12px; height: 12px; border-radius: 50%; }
    .wr { background: #ff5f57; }
    .wy { background: #febc2e; }
    .wg { background: #28c840; }
    .win-bar-title {
      flex: 1;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.28);
      margin-right: 36px;
      letter-spacing: 0.02em;
    }
    .win-body { display: flex; height: calc(100% - 42px); }
    .win-sidebar {
      width: 200px;
      border-right: 1px solid rgba(255,255,255,0.05);
      padding: 20px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .sidebar-label {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      padding: 0 8px;
      margin-bottom: 6px;
    }
    .dev-row {
      padding: 9px 10px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.38);
    }
    .dev-row.active {
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.7);
    }
    .dev-led { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .win-main {
      flex: 1;
      padding: 24px 28px;
    }
    .scenes-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    .scene-tile {
      border-radius: 10px;
      aspect-ratio: 1;
      border: 1px solid rgba(255,255,255,0.07);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.38);
    }
    .scene-tile.on { border-color: rgba(212,183,117,0.35); }
    .scene-swatch { width: 34px; height: 34px; border-radius: 50%; }
    .stats-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 36px;
      background: rgba(255,255,255,0.015);
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 24px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      font-family: 'Courier New', monospace;
    }

    /* Hero title block */
    .hero {
      position: absolute;
      bottom: 96px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      white-space: nowrap;
      z-index: 10;
    }
    .hero-title {
      font-size: clamp(72px, 6.4vw, 92px);
      font-weight: 700;
      letter-spacing: -3px;
      line-height: 1;
      color: #f5f4f1;
    }
    .hero-title .gold { color: #D4B775; }
    .hero-sub {
      margin-top: 14px;
      font-size: 17px;
      font-weight: 300;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.06em;
    }
    .hero-sub .dot { color: rgba(255,255,255,0.15); margin: 0 8px; }
  </style>
</head>
<body>
  <div class="glow-r"></div>

      <div class="win-main">

          <div class="scene-tile">

          </div>

      </div>
    </div>
    <div class="stats-bar">

  </div>

  <!-- Hero text -->
  <div class="hero">

    <p class="hero-sub">
      RGB sync<span class="dot">Â·</span>Scenes<span class="dot">Â·</span>Live metrics
    </p>
  </div>
</body>
</html>
