<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CleanFeed Skip Demo</title>
  <style>
    :root {
      --bg: #0B0B0B;
      --surface: #18181b;
      --surface-soft: #1f1f23;
      --border: #2a2a2f;
      --text: #f0ede8;
      --desc: #7d7975;
      --muted: #5a5a62;
      --gold: #d4a84b;
      --gold-soft: rgba(212,168,75,0.13);
      --radius: 10px;
      --mono: ui-monospace, 'JetBrains Mono', Menlo, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      overflow: hidden;
    }

    /* Skip Configuration panel, matches speed-demo .panel exactly */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 520px;
      max-width: 100%;
      overflow: hidden;
    }
    .panel-head {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.1px;
    }
    .panel-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
    }
    .panel-row:last-child { border-bottom: 0; }
    .row-key {
      flex: 1;
      min-width: 0;
    }
    .row-key strong {
      display: block;
      font-size: 17px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.1px;
    }
    .row-key span {
      display: block;
      margin-top: 2px;
      font-size: 12px;
      color: var(--desc);
    }
    .row-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .control {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .control-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .step-btn {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      color: var(--desc);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .step-value {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--gold);
      background: var(--gold-soft);
      border: 1px solid rgba(212,168,75,0.3);
      border-radius: 6px;
      padding: 4px 10px;
      min-width: 56px;
      text-align: center;
    }
    .key-pill {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text);
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 14px;
      min-width: 40px;
      text-align: center;
    }
    @media (max-width: 600px) {
      body { padding: 56px 16px 20px; }
      .panel { padding: 12px 14px; }
      .panel-title { font-size: 12px; }
      .row-label { font-size: 11px; }
      .row-sub { font-size: 9px; }
      .control-num { font-size: 11px; padding: 3px 8px; }
      .control-btn { padding: 3px 8px; font-size: 11px; }
      .control-sub { font-size: 8px; }
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="panel-head">
      <div class="panel-title">Skip Configuration</div>
    </div>
    <div class="panel-row">
      <div class="row-key">
        <strong>Forward</strong>
        <span>+10s per press</span>
      </div>
      <div class="row-controls">
        <div class="control">
          <span class="control-label">seconds</span>
          <div class="step">
            <button class="step-btn">&minus;</button>
            <span class="step-value">10s</span>
            <button class="step-btn">+</button>
          </div>
        </div>
        <div class="control">
          <span class="control-label">key</span>
          <span class="key-pill">&rarr;</span>
        </div>
      </div>
    </div>
    <div class="panel-row">
      <div class="row-key">
        <strong>Back</strong>
        <span>&minus;10s per press</span>
      </div>
      <div class="row-controls">
        <div class="control">
          <span class="control-label">seconds</span>
          <div class="step">
            <button class="step-btn">&minus;</button>
            <span class="step-value">10s</span>
            <button class="step-btn">+</button>
          </div>
        </div>
        <div class="control">
          <span class="control-label">key</span>
          <span class="key-pill">&larr;</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('button').forEach(el => {
      el.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); });
      el.tabIndex = -1;
    });
  </script>
</body>
</html>
