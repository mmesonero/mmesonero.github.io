<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claude Token Tracker, Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0D0D0D; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 18px 80px 18px 24px;
      overflow: hidden;
    }

    /* Window chrome */
    .window {
      width: 320px;
      background: #0F0E0D;
      max-width: 100%;
      background: #1A1A17;
      color: #FFFDF7;
      border-radius: 12px;
      overflow: hidden;
      box-shadow:
        0 40px 100px rgba(0,0,0,0.7),
        0 0 0 1px rgba(255,255,255,0.04);
      -webkit-font-smoothing: antialiased;
    }

    .titlebar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #1A1A17;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .titlebar-icon { width: 14px; height: 14px; flex-shrink: 0; }
    .titlebar-icon img { width: 100%; height: 100%; display: block; }
    .titlebar-title {
      flex: 1;
      font-size: 11.5px;
      color: rgba(255,253,247,0.6);
      letter-spacing: 0.2px;
    }
    .titlebar-actions {
      display: flex;
      gap: 8px;
      color: rgba(255,253,247,0.45);
    }
    .titlebar-actions span {
      width: 14px; height: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      cursor: default;
    }

    .body {
      padding: 24px 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      width: 320px;
      position: relative;
    }
    .logo { width: 28px; height: 28px; flex-shrink: 0; }
    .logo img { width: 100%; height: 100%; display: block; }
    .header-text h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .header-text p {
      font-size: 11.5px;
      color: rgba(255,253,247,0.35);
      margin-top: 1px;
    }

    /* Dashboard button */
    .open-usage {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      font-family: inherit;
      font-size: 9px;
      font-weight: 600;
      line-height: 1;
      color: rgba(255,253,247,0.65);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 5px 9px;
      border: 1px solid rgba(255,253,247,0.12);
      border-radius: 10px;
      background: rgba(255,253,247,0.03);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .open-usage:hover {
      color: #FFFDF7;
      border-color: rgba(217,119,87,0.45);
      background: rgba(217,119,87,0.10);
    }

    /* Cards */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 320px;
    }
    .card {
      background: rgba(255,253,247,0.04);
      border: 1px solid rgba(255,253,247,0.07);
      border-radius: 12px;
      padding: 18px 20px 16px;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
      position: relative;
    }
    .card:hover {
      background: rgba(255,253,247,0.06);
      border-color: rgba(255,253,247,0.12);
    }
    .card.expanded {
      background: rgba(255,253,247,0.055);
      border-color: rgba(255,253,247,0.11);
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 16px;
    }
    .card-label {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,253,247,0.55);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .card-reset {
      font-size: 11px;
      color: rgba(255,253,247,0.28);
    }
    .chevron {
      display: inline-block;
      font-size: 9px;
      color: rgba(255,253,247,0.2);
      vertical-align: middle;
      margin-left: 5px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.3s ease;
    }
    .card:hover .chevron,
    .card.expanded .chevron { opacity: 1; }
    .card.expanded .chevron { transform: rotate(180deg); }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .bar-track {
      flex: 1;
      height: 4px;
      background: rgba(255,253,247,0.08);
      border-radius: 100px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 100px;
      transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .pct {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      min-width: 58px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* Expand details */
    .card-details {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1),
                  opacity 0.3s ease 0.05s,
                  margin-top 0.3s ease;
      margin-top: 0;
    }
    .card.expanded .card-details {
      max-height: 200px;
      opacity: 1;
      margin-top: 14px;
    }
    .detail-divider {
      height: 1px;
      background: linear-gradient(90deg, rgba(255,253,247,0.06), rgba(255,253,247,0.03));
      margin-bottom: 10px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 0;
    }
    .detail-label { font-size: 11px; color: rgba(255,253,247,0.28); }
    .detail-value { font-size: 11px; color: rgba(255,253,247,0.5); font-weight: 500; }
    .detail-heading {
      font-size: 9px;
      color: rgba(255,253,247,0.18);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 8px 0 3px;
    }
    .model-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5px 0;
    }
    .model-name {
      font-size: 10.5px;
      color: rgba(255,253,247,0.25);
    }
    .model-tokens {
      font-size: 10.5px;
      color: rgba(255,253,247,0.38);
    }

    /* Live row */
    .live-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 14px;
      width: 320px;
    }
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #4ADE80;
      border: 1px solid rgba(74,222,128,0.35);
      border-radius: 100px;
      padding: 3px 8px 3px 6px;
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse-dot 1.6s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.6); opacity: 0.6; }
    }
    .footer-link {
      font-size: 11px;
      color: rgba(255,253,247,0.2);
      text-decoration: none;
      letter-spacing: 0.01em;
    }
    .updated {
      margin-top: 12px;
      font-size: 10.5px;
      color: rgba(255,253,247,0.18);
    }

    @media (max-width: 600px) {
      body { padding: 14px 12px 14px 50%; justify-content: flex-start; align-items: center; }
      .window { width: 100%; max-width: 200px; border-radius: 9px; box-shadow: 0 12px 28px rgba(0,0,0,0.6); }
      .titlebar { padding: 5px 7px; gap: 5px; }
      .titlebar-icon { width: 9px; height: 9px; }
      .titlebar-title { font-size: 7.5px; }
      .titlebar-actions { gap: 4px; }
      .titlebar-actions span { width: 9px; height: 9px; font-size: 8px; }
      .body { padding: 11px 12px 10px; }
      .header { width: 100%; margin-bottom: 10px; gap: 6px; }
      .logo { width: 16px; height: 16px; }
      .header-text h1 { font-size: 10px; }
      .header-text p { font-size: 7px; }
      .open-usage { font-size: 6px; padding: 3px 5px; border-radius: 6px; }
      .cards { width: 100%; gap: 7px; }
      .card { padding: 9px 10px 8px; border-radius: 8px; }
      .card-top { margin-bottom: 8px; }
      .card-label { font-size: 7.5px; }
      .card-reset { font-size: 6.5px; }
      .bar-row { gap: 8px; }
      .bar-track { height: 2.5px; }
      .pct { font-size: 13px; min-width: 32px; }
      .live-row { width: 100%; gap: 8px; margin-top: 8px; }
      .live-badge { font-size: 6.5px; padding: 2px 5px 2px 4px; }
      .live-dot { width: 4px; height: 4px; }
      .footer-link { font-size: 7px; }
      .updated { font-size: 6.5px; margin-top: 6px; }
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <div class="titlebar-icon"><img src="ctt-icon.png" alt="" /></div>
      <span class="titlebar-title">Claude Token Tracker</span>
      <div class="titlebar-actions">
        <span>&#8211;</span>
        <span>&#9744;</span>
        <span>&#10005;</span>
      </div>
    </div>

    <div class="body">
      <div class="header">
        <div class="logo"><img src="ctt-icon-large.png" alt="" /></div>
        <div class="header-text">
          <h1>Usage</h1>
          <p>claude.ai</p>
        </div>
        <button class="open-usage" type="button">Dashboard</button>
      </div>

      <div class="cards">
        <div class="card" id="card-daily">
          <div class="card-top">
            <span class="card-label">5-hour limit <span class="chevron">â–¾</span></span>
          </div>
          <div class="bar-row">
            <div class="bar-track">
              <div class="bar-fill" style="width:0%;background:#F97316;"></div>
            </div>
            <span class="pct" style="color:#F97316;">0%</span>
          </div>
          <div class="card-details">
            <div class="detail-divider"></div>
            <div class="detail-row">
              <span class="detail-label">Resets in</span>
              <span class="detail-value">1h 43m</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Today</span>
              <span class="detail-value">2.1M tokens</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">In / Out</span>
              <span class="detail-value">1.4M / 680K</span>
            </div>
            <div class="detail-heading">Models</div>
            <div class="model-row">
              <span class="model-name">Sonnet 4.6</span>
              <span class="model-tokens">1.8M</span>
            </div>
            <div class="model-row">
              <span class="model-name">Opus 4.8</span>
              <span class="model-tokens">320K</span>
            </div>
          </div>
        </div>

        <div class="card" id="card-weekly">
          <div class="card-top">
            <span class="card-label">Weekly <span class="chevron">â–¾</span></span>
          </div>
          <div class="bar-row">
            <div class="bar-track">
              <div class="bar-fill" style="width:0%;background:#3B82F6;"></div>
            </div>
            <span class="pct" style="color:#3B82F6;">0%</span>
          </div>
          <div class="card-details">
            <div class="detail-divider"></div>
            <div class="detail-row">
              <span class="detail-label">Resets in</span>
              <span class="detail-value">5d 20h</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">This week</span>
              <span class="detail-value">5.8M tokens</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">In / Out</span>
              <span class="detail-value">3.9M / 1.9M</span>
            </div>
          </div>
        </div>
      </div>

      <div class="live-row">
        <span class="footer-link">GitHub</span>
        <span class="live-badge">
          <span class="live-dot"></span>
          LIVE
        </span>
        <span class="footer-link">LinkedIn</span>
      </div>

      <div class="updated">Updated at 00:47:08</div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => {
        const isExpanded = card.classList.contains('expanded');
        document.querySelectorAll('.card.expanded').forEach(c => c.classList.remove('expanded'));
        if (!isExpanded) card.classList.add('expanded');
      });
    });
  </script>

  <script>
    /* Scale window to fit available iframe height (below JSX title overlay). */
    (function () {
      function fit() {
        var w = window.innerWidth, h = window.innerHeight;
        if (w <= 0 || h <= 0) return;
        var win = document.querySelector('.window');
        if (!win) return;
        win.style.transform = '';
        win.style.transformOrigin = 'center right';
        var rw = win.scrollWidth, rh = win.scrollHeight;
        if (rw <= 0 || rh <= 0) return;
        var availW = w * 0.50;        // right half of slide (split layout)
        var availH = h - 36;          // 18 top + 18 bottom
        var s = Math.min(1, availW / rw, availH / rh);
        if (s <= 0) return;
        win.style.transform = 'scale(' + s + ')';
      }
      window.addEventListener('resize', fit);
      window.addEventListener('load', fit);
      if (window.ResizeObserver) new ResizeObserver(fit).observe(document.documentElement);
      fit();
    }());
  </script>
</body>
</html>
