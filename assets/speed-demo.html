<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CleanFeed Speed Demo</title>
  <style>
    :root {
      --bg: #0B0B0B;
      --surface: #18181b;
      --surface-soft: #1f1f23;
      --border: #2a2a2f;
      --text: #f0ede8;
      --desc: #7d7975;
      --muted: #5a5a62;
      --gold: #d4a84b;
      --gold-soft: rgba(212,168,75,0.13);
      --radius: 10px;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --mono: ui-monospace, 'JetBrains Mono', Menlo, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: clamp(16px, 4vh, 48px) 48px clamp(16px, 3vh, 40px);
      gap: clamp(20px, 4vh, 48px);
      position: relative;
      overflow: hidden;
    }

    .hero-text {
      text-align: center;
      max-width: 760px;
    }
    .label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .title {
      font-family: var(--serif);
      font-weight: 300;
      font-size: clamp(30px, 7.5vh, 64px);
      line-height: 1.05;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .title em {
      font-style: italic;
      color: var(--gold);
    }
    .subtitle {
      margin-top: 18px;
      font-size: 16px;
      line-height: 1.55;
      color: var(--desc);
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Layout: panel left, bubble+menu right */
    .demo-row {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 56px;
      width: 100%;
      flex-wrap: wrap;
    }

    /* Speed Configuration panel */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 520px;
      max-width: 100%;
      overflow: hidden;
    }
    .panel-head {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.1px;
    }
    .panel-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
    }
    .panel-row:last-child { border-bottom: 0; }
    .row-key {
      flex: 1;
      min-width: 0;
    }
    .row-key strong {
      display: block;
      font-size: 17px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.1px;
    }
    .row-key span {
      display: block;
      margin-top: 2px;
      font-size: 12px;
      color: var(--desc);
    }
    .row-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .control {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .control-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .step-btn {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      color: var(--desc);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .step-value {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--gold);
      background: var(--gold-soft);
      border: 1px solid rgba(212,168,75,0.3);
      border-radius: 6px;
      padding: 4px 10px;
      min-width: 56px;
      text-align: center;
    }
    .key-pill {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text);
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 14px;
      min-width: 40px;
      text-align: center;
    }

    /* Floating bubble HUD, matches content/video.js styling */
    .hud-wrap {
      display: flex;
      flex-direction: column;
      gap: 7px;
      align-items: flex-start;
      width: 232px;
    }
    .hud-pill {
      background: rgba(8,8,10,0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #fff;
      font: 600 12px/1 var(--mono);
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      letter-spacing: 0.5px;
      min-width: 40px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .hud-menu {
      background: rgba(8,8,10,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      box-shadow: 0 18px 50px rgba(0,0,0,0.55);
    }
    .hud-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .hud-label-row .lbl {
      font: 500 10px/1 var(--mono);
      color: rgba(255,255,255,0.65);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .hud-label-row .reset {
      font: 500 10px/1 var(--mono);
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.5px;
      cursor: pointer;
    }
    .hud-speed {
      text-align: center;
      font: 700 22px/1 var(--mono);
      color: #fff;
      letter-spacing: -0.3px;
      padding: 2px 0;
    }
    .hud-slider {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hud-slider-btn {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .hud-track {
      flex: 1;
      position: relative;
      height: 20px;
      display: flex;
      align-items: center;
    }
    .hud-track-bg {
      position: absolute;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
    }
    .hud-track-fill {
      position: absolute;
      left: 0;
      height: 3px;
      width: 7.7%;
      background: var(--gold);
      border-radius: 999px;
    }
    .hud-thumb {
      position: absolute;
      width: 22px;
      height: 22px;
      object-fit: contain;
      filter: drop-shadow(0 1px 4px rgba(0,0,0,0.9));
      left: 7.7%;
      transform: translate(-50%, -50%);
      top: 50%;
      cursor: grab;
    }
    .hud-presets {
      display: flex;
      gap: 4px;
    }
    .hud-preset {
      flex: 1;
      text-align: center;
      font: 600 11px/1 var(--mono);
      color: rgba(255,255,255,0.7);
      padding: 5px 2px;
      border-radius: 5px;
      border: 1px solid transparent;
      cursor: pointer;
    }
    .hud-preset.active {
      color: var(--gold);
      background: rgba(212,168,75,0.12);
      border-color: rgba(212,168,75,0.35);
    }

    /* Caller label above bubble */
    .hud-tag {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    @media (max-width: 880px) {
      .title { font-size: 44px; }
      .demo-row { gap: 32px; }
      .panel { width: 100%; }
      body { padding: 32px 24px; gap: 28px; }
    }
    @media (max-width: 600px) {
      .demo-row { gap: 14px; flex-direction: column; }
      .panel { padding: 8px 10px; }
      .panel-title { font-size: 12px; }
      .panel-row { padding: 12px 10px; }
    }
  </style>
</head>
<body>
  <div class="demo-row">
    <!-- Speed Configuration panel -->
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Speed Configuration</div>
      </div>
      <div class="panel-row">
        <div class="row-key">
          <strong>Up</strong>
          <span>+0.25&times; per press</span>
        </div>
        <div class="row-controls">
          <div class="control">
            <span class="control-label">step size</span>
            <div class="step">
              <button class="step-btn">&minus;</button>
              <span class="step-value">0.25&times;</span>
              <button class="step-btn">+</button>
            </div>
          </div>
          <div class="control">
            <span class="control-label">key</span>
            <span class="key-pill">+</span>
          </div>
        </div>
      </div>
      <div class="panel-row">
        <div class="row-key">
          <strong>Down</strong>
          <span>&minus;0.25&times; per press</span>
        </div>
        <div class="row-controls">
          <div class="control">
            <span class="control-label">step size</span>
            <div class="step">
              <button class="step-btn">&minus;</button>
              <span class="step-value">0.25&times;</span>
              <button class="step-btn">+</button>
            </div>
          </div>
          <div class="control">
            <span class="control-label">key</span>
            <span class="key-pill">&minus;</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Floating bubble HUD -->
    <div class="hud-wrap">
      <div class="hud-tag">On every video</div>
      <div class="hud-pill">1&times;</div>
      <div class="hud-menu">
        <div class="hud-label-row">
          <span class="lbl">Velocidad</span>
          <span class="reset">reset</span>
        </div>
        <div class="hud-speed">1&times;</div>
        <div class="hud-slider">
          <span class="hud-slider-btn">&minus;</span>
          <div class="hud-track">
            <div class="hud-track-bg"></div>
            <div class="hud-track-fill"></div>
            <img class="hud-thumb" src="cleanfeed-logo.png" alt="" />
          </div>
          <span class="hud-slider-btn">+</span>
        </div>
        <div class="hud-presets">
          <span class="hud-preset active">1&times;</span>
          <span class="hud-preset">2&times;</span>
          <span class="hud-preset">4&times;</span>
          <span class="hud-preset">6&times;</span>
          <span class="hud-preset">10&times;</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('button, .hud-preset, .reset').forEach(el => {
      el.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); });
      el.tabIndex = -1;
    });
  </script>
</body>
</html>
